name: NutriTrack
options:
  bundleIdPrefix: com.fredericbahnson.nutritrack
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  NutriTrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutriTrack
        excludes:
          - "**/.DS_Store"
    resources:
      - path: NutriTrack/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fredericbahnson.nutritrack
        INFOPLIST_FILE: NutriTrack/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: JGVUZQUHA8
        SWIFT_STRICT_CONCURRENCY: complete
        APP_GROUP_IDENTIFIER: group.com.fredericbahnson.nutritrack
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
    entitlements:
      path: NutriTrack/NutriTrack.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.fredericbahnson.nutritrack
    dependencies:
      - target: NutriTrackWidget
        embed: true

  NutriTrackWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutriTrackWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fredericbahnson.nutritrack.widget
        INFOPLIST_FILE: NutriTrackWidget/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: JGVUZQUHA8
        SKIP_INSTALL: YES
        APP_GROUP_IDENTIFIER: group.com.fredericbahnson.nutritrack
    entitlements:
      path: NutriTrackWidget/NutriTrackWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.fredericbahnson.nutritrack
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  NutriTrackTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutriTrackTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fredericbahnson.nutritrack.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NutriTrack.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/NutriTrack"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: NutriTrack

schemes:
  NutriTrack:
    build:
      targets:
        NutriTrack: all
        NutriTrackWidget: [build]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NutriTrackTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  NutriTrackWidget:
    build:
      targets:
        NutriTrackWidget: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
